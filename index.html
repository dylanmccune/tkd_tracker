<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKD Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="sidebar">
        <h3 class="nav-header">
            TKD Tracker
        </h3>
        <ul class="nav-items">
            <li><a>Abcdefg</a></li>
            <li><a>hijklmnop</a></li>
            <li><a>qrstuv</a></li>
            <li><a>wxyz</a></li>
        </ul>
    </nav>
    <main>
        <!-- Possible other greetings:
         - Hello {name}!
         - Good {morning, afternoon, evening}, {name} 
         - Welcome back! (maybe with name?)
         etc-->
        <article class="card card-greeting">
            <div class="avatar"></div>
            <h3>Hello, Dylan!</h3>
            <!-- lots of room on the right side of this for more stuff -->
        </article>
    </main>
    <a href="#" class="new-button" title="Log new entry">
        <!-- Button to log a new practice journal entry or smth -->
        <i data-lucide="plus"></i>
    </a>

    <div class="popup-wrapper" id="popup">
        <div class="log-popup">
            <form class="popup-form">
                <label for="date">Date: </label>
                <input type="date" id="date" name="date">
                <label for="lesson-type">Lesson type: </label>
                <select name="lesson-type" id="lesson-type">
                    <option value="class">Regular class</option>
                    <option value="sparring">Sparring</option>
                    <option value="at-home">At-home practice</option>
                    <option value="conditioning">Conditioning/stretching</option>
                </select>
            </form>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
